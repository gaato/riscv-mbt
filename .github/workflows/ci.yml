name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            make \
            gcc-riscv64-unknown-elf \
            binutils-riscv64-unknown-elf

      - name: Set up MoonBit
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          "$HOME/.moon/bin/moon" update

      - name: Build official riscv-tests ELF artifacts
        run: |
          bash ./scripts/build-riscv-tests-official.sh

      - name: Verify project
        run: |
          moon version
          moon check
          moon test
